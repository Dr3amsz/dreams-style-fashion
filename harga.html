<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dreams Style - Harga</title>
    <link rel="stylesheet" href="assets/css/bootstrap.min.css"> 
    <link rel="stylesheet" href="style.css">
</head>
<body class="page-fade">

    <nav class="navbar navbar-expand-lg navbar-light sticky-top shadow-sm">
        <div class="container">
            <a class="navbar-brand d-lg-none fw-bold" href="index.html">DREAMS STYLE</a>
            
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            
            <div class="collapse navbar-collapse justify-content-center" id="navbarNav">
                <ul class="navbar-nav fw-bold text-uppercase align-items-center">
                    <li class="nav-item"><a class="nav-link px-3" href="index.html">Beranda</a></li>
                    <li class="nav-item"><a class="nav-link px-3" href="koleksi.html">Koleksi</a></li>
                    
                    <li class="nav-item d-none d-lg-block">
                        <a class="navbar-brand mx-4 fs-4" href="index.html">DREAMS STYLE</a>
                    </li>
                    
                    <li class="nav-item"><a class="nav-link px-3 active" href="harga.html">Membership</a></li>
                    <li class="nav-item"><a class="nav-link px-3" href="kontak.html">Kontak</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <section class="py-5">
        <div class="container">
            <h2 class="text-center mb-5 fw-bold">Paket Membership</h2>
            
            <div class="text-center mb-5">
                <div class="btn-group" role="group">
                    <button type="button" class="btn btn-outline-primary active" id="btn-monthly">Bulanan</button>
                    <button type="button" class="btn btn-outline-primary" id="btn-yearly">Tahunan</button>
                </div>
            </div>

            <div class="row justify-content-center g-4">
                <div class="col-md-4">
                    <div class="card h-100 collection-card text-center">
                        <img src="assets/img/gaeun.jpeg" class="card-img-top custom-img" alt="Basic Style">

                        <div class="card-body">
                            <h5 class="package-name-text text-uppercase fw-bold">Basic</h5>
                            <div class="price-container my-3">
                                <h2 class="price-val fw-bold" data-monthly="99k" data-yearly="990k">IDR 99k</h2>
                                <span class="price-period-text text-muted">/bulan</span>
                            </div>
                            
                            <button class="btn btn-primary w-100 mt-2 shadow-sm">Pilih Paket</button>
                        </div>
                    </div>
                </div>

                <div class="col-md-4">
                    <div class="card h-100 collection-card text-center">
                        <img src="assets/img/goyounjung.jpeg" class="card-img-top custom-img" alt="Loyal Style">
                        <div class="card-body">
                            <h5 class="package-name-text text-uppercase fw-bold">Premium</h5>
                            <div class="price-container my-3">
                                <h2 class="price-val fw-bold" data-monthly="199k" data-yearly="1.9M">IDR 199k</h2>
                                <span class="price-period-text text-muted">/bulan</span>
                            </div>
                            <button class="btn btn-primary w-100 mt-2 shadow-sm">Pilih Paket</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <footer class="bg-dark text-white text-center py-4 mt-auto">
        <div class="container"><p class="mb-0">&copy; 2026 Dreams Gureum. All rights reserved.</p></div>
    </footer>

    <script src="assets/js/bootstrap.bundle.min.js"></script> 
    <script src="js.js"></script>
